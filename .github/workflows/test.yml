name: Tests

on:
    workflow_call:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup node 18
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: install dependencies
              run: npm ci

            - name: Run tests
              run: npm test
