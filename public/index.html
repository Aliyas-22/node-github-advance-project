<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DevSecOps Pipeline Demo</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(15deg, #AA336A, #764ba2);
            font-family: Arial, Helvetica, sans-serif;
            color: #FDFBD4;
        }

        .card {
            text-align: center;
            padding: 50px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            background: rgba(255, 155, 235, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: 0.4s;
        }

        .card:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        p {
            font-size: 21px;
        }

        .signature {
            margin-top: 30px;
            font-size: 16px;
            opacity: 0.8;
        }

        .signature span {
            color: pink;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="card">

        <h1>✅ DevSecOps of Node Project</h1>

        <p>
            Successfully deployed using CI/CD pipeline + DevSecOps
            <br>
            Built with passion for learning DevSecOps.
        </p>

        <div class="signature">
            Made with 🎀 by <span>Aliya Firdous</span>
        </div>

    </div>

</body>

</html>
